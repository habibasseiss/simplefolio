services:
  app:
    build: .
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/simplefolio
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  cron:
    image: alpine:latest
    environment:
      CRON_SECRET: ${CRON_SECRET}
    command: >
      sh -c "apk add --no-cache curl && echo '0 0 * * * /usr/bin/curl -fsSL -X POST -H \"Authorization: Bearer $$CRON_SECRET\" http://app:3000/api/cron/import-dividends' > /etc/crontabs/root && crond -f -l 8"
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simplefolio
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
